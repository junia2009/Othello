<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Ocean: light at surface → deep abyss -->
    <linearGradient id="ocean" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1a7ab0"/>
      <stop offset="55%"  stop-color="#0a3d6e"/>
      <stop offset="100%" stop-color="#031428"/>
    </linearGradient>

    <!-- Pearl: bright bioluminescent white piece -->
    <radialGradient id="pearl" cx="38%" cy="32%" r="62%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="50%"  stop-color="#c8f0ff"/>
      <stop offset="100%" stop-color="#50c8f0"/>
    </radialGradient>

    <!-- Obsidian: deep dark piece with blue tint -->
    <radialGradient id="obsidian" cx="38%" cy="32%" r="62%">
      <stop offset="0%"   stop-color="#1e3a5a"/>
      <stop offset="100%" stop-color="#030c1e"/>
    </radialGradient>

    <!-- Clip to rounded square -->
    <clipPath id="icon-clip">
      <rect width="512" height="512" rx="88"/>
    </clipPath>
  </defs>

  <g clip-path="url(#icon-clip)">

    <!-- Ocean background -->
    <rect width="512" height="512" fill="url(#ocean)"/>

    <!-- Surface light (top) -->
    <ellipse cx="220" cy="-20" rx="260" ry="180"
             fill="rgba(120,200,255,0.18)"/>

    <!-- Subtle caustic shimmer lines -->
    <g stroke="rgba(150,220,255,0.08)" stroke-width="18" stroke-linecap="round">
      <line x1="120" y1="0"  x2="80"  y2="200"/>
      <line x1="260" y1="0"  x2="240" y2="180"/>
      <line x1="390" y1="0"  x2="420" y2="220"/>
    </g>

    <!-- Board: faint panel to anchor the pieces -->
    <rect x="86" y="86" width="340" height="340" rx="14"
          fill="rgba(0,0,0,0.30)"/>
    <rect x="86" y="86" width="340" height="340" rx="14"
          fill="none" stroke="rgba(100,200,255,0.22)" stroke-width="2"/>

    <!-- Dividing lines (just the center cross — legible at all sizes) -->
    <line x1="256" y1="86"  x2="256" y2="426" stroke="rgba(100,190,255,0.18)" stroke-width="2"/>
    <line x1="86"  y1="256" x2="426" y2="256" stroke="rgba(100,190,255,0.18)" stroke-width="2"/>

    <!-- ═══ Glow halos behind white pieces ═══ -->
    <circle cx="191" cy="191" r="90" fill="rgba(0,200,255,0.12)"/>
    <circle cx="191" cy="191" r="72" fill="rgba(0,215,255,0.16)"/>
    <circle cx="321" cy="321" r="90" fill="rgba(0,200,255,0.12)"/>
    <circle cx="321" cy="321" r="72" fill="rgba(0,215,255,0.16)"/>

    <!-- ═══ Obsidian pieces (black) ═══ -->
    <circle cx="321" cy="191" r="62" fill="url(#obsidian)"/>
    <!-- Blue shimmer highlight on obsidian -->
    <circle cx="307" cy="178" r="16" fill="rgba(60,120,220,0.28)"/>

    <circle cx="191" cy="321" r="62" fill="url(#obsidian)"/>
    <circle cx="177" cy="308" r="16" fill="rgba(60,120,220,0.28)"/>

    <!-- ═══ Pearl pieces (white / bioluminescent) ═══ -->
    <circle cx="191" cy="191" r="62" fill="url(#pearl)"/>
    <!-- Specular highlight -->
    <circle cx="175" cy="175" r="18" fill="rgba(255,255,255,0.72)"/>
    <!-- Rim glow -->
    <circle cx="191" cy="191" r="62"
            fill="none" stroke="rgba(120,230,255,0.65)" stroke-width="3"/>

    <circle cx="321" cy="321" r="62" fill="url(#pearl)"/>
    <circle cx="305" cy="305" r="18" fill="rgba(255,255,255,0.72)"/>
    <circle cx="321" cy="321" r="62"
            fill="none" stroke="rgba(120,230,255,0.65)" stroke-width="3"/>

    <!-- ═══ Bubbles ═══ -->
    <!-- Large bubble, top-left -->
    <circle cx="72"  cy="148" r="22"
            fill="rgba(200,240,255,0.08)"
            stroke="rgba(255,255,255,0.55)" stroke-width="2.5"/>
    <circle cx="63"  cy="139" r="6"  fill="rgba(255,255,255,0.55)"/>

    <!-- Medium bubble, right -->
    <circle cx="448" cy="210" r="16"
            fill="rgba(200,240,255,0.08)"
            stroke="rgba(255,255,255,0.50)" stroke-width="2.5"/>
    <circle cx="441" cy="203" r="4"  fill="rgba(255,255,255,0.50)"/>

    <!-- Small bubble cluster, bottom-left -->
    <circle cx="62"  cy="350" r="10"
            fill="rgba(200,240,255,0.08)"
            stroke="rgba(255,255,255,0.45)" stroke-width="2"/>
    <circle cx="57"  cy="344" r="3"  fill="rgba(255,255,255,0.45)"/>

    <circle cx="88"  cy="390" r="7"
            fill="rgba(200,240,255,0.06)"
            stroke="rgba(255,255,255,0.40)" stroke-width="1.5"/>

    <!-- Small bubble, top-right -->
    <circle cx="450" cy="120" r="8"
            fill="rgba(200,240,255,0.06)"
            stroke="rgba(255,255,255,0.42)" stroke-width="1.5"/>
    <circle cx="447" cy="116" r="2"  fill="rgba(255,255,255,0.42)"/>

    <!-- ═══ Fish silhouette (top-right, swimming left) ═══ -->
    <g transform="translate(400,72) scale(-1,1)" opacity="0.55">
      <ellipse cx="20" cy="0" rx="22" ry="10" fill="rgba(150,215,255,0.7)"/>
      <polygon points="42,0 56,-10 56,10"       fill="rgba(150,215,255,0.6)"/>
      <circle  cx="8"  cy="-3" r="3"            fill="rgba(220,245,255,0.8)"/>
    </g>

    <!-- Vignette (depth effect) -->
    <radialGradient id="vig" cx="50%" cy="50%" r="70%">
      <stop offset="40%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,5,20,0.55)"/>
    </radialGradient>
    <rect width="512" height="512" fill="url(#vig)"/>

  </g>
</svg>
